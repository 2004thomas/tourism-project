<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Signup</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<style>
     ::-webkit-scrollbar{
    display: none;
 }
 html{
    scrollbar-width: none;
 }
 body{
    -ms-overflow-style: none;
 }
.back-btn {
    position: absolute;
    top: 20px;
    left: 20px;

    width: 45px;
    height: 45px;

    display: flex;
    align-items: center;
    justify-content: center;

    background: rgba(255, 255, 255, 0.8);
    color: #111;

    border-radius: 50%;
    backdrop-filter: blur(10px);

    box-shadow: 0 4px 15px rgba(0,0,0,0.2);

    transition: all 0.3s ease;
    text-decoration: none;
}

.back-btn:hover {
    transform: scale(1.1);
    background: white;
     box-shadow: 0 0 10px rgba(13,110,253,0.6);
}

body{

background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
height:100vh;
display:flex;
align-items:center;
justify-content:center;
font-family:system-ui;

}

.signup-card{

width:450px;
border-radius:15px;
box-shadow:0 10px 40px rgba(0,0,0,0.3);
padding:20px;
background:white;

}

.title{

text-align:center;
margin-bottom:25px;

}

.btn-signup{

background:#0d6efd;
border:none;
border-radius:10px;
padding:12px;
font-weight:600;

}

.btn-signup:hover{

background:#0b5ed7;

}

.form-control{

border-radius:10px;
padding:12px;

}
input:focus{
    box-shadow: 0 0 8px rgba(13,110,253,0.5);
}
</style>

</head>

<body>

<div class="signup-card">

<div class="title">
<a href="{% url 'home' %}" class="back-btn">
        <i class="bi bi-house-door"></i>
    </a>
<h3><i class="bi bi-person-plus"></i> Create Account</h3>
<p class="text-muted">Join PTA Explorer</p>

</div>

{% if form.errors %}
<div class="alert alert-danger">

    {% for field in form %}
        {% for error in field.errors %}
            <div>{{ error }}</div>
        {% endfor %}
    {% endfor %}

    {% for error in form.non_field_errors %}
        <div>{{ error }}</div>
    {% endfor %}

</div>
{% endif %}

<form method="POST">

{% csrf_token %}

<div class="mb-3">

<label class="form-label">Username</label>

<div class="input-group">

<span class="input-group-text">
<i class="bi bi-person"></i>
</span>

<input type="text" name="username" class="form-control" required>

</div>

</div>

<div class="mb-3">

<label class="form-label">Email</label>

<div class="input-group">

<span class="input-group-text">
<i class="bi bi-envelope"></i>
</span>

<input type="email" name="email" class="form-control" required>

</div>

</div>

<div class="mb-3">

<label class="form-label">Password</label>

<div class="input-group">

<span class="input-group-text">
<i class="bi bi-lock"></i>
</span>

<input type="password" name="password1" class="form-control" required>

</div>

</div>

<div class="mb-3">

<label class="form-label">Confirm Password</label>

<div class="input-group">

<span class="input-group-text">
<i class="bi bi-lock-fill"></i>
</span>

<input type="password" name="password2" class="form-control" required>

</div>

</div>

<button type="submit" class="btn btn-signup w-100">
Create Account
</button>

</form>

<div class="text-center mt-3">

<p class="text-muted">
Already have an account?
<a href="{% url 'login' %}">Login</a>
</p>

</div>

</div>

<script>

    

const usernameInput = document.getElementById("username");
const passwordInput = document.getElementById("password");

usernameInput.addEventListener("input", () => {
    const value = usernameInput.value;

    const validLength = value.length >= 4;
    const validChars = /^[a-zA-Z0-9@.+-_]+$/.test(value);

    const rules = document.getElementById("usernameRules");

    rules.innerHTML = `
    <span style="color:${validLength ? 'green' : 'red'}">✔ At least 4 characters</span><br>
    <span style="color:${validChars ? 'green' : 'red'}">✔ Valid characters (@ . + - _)</span>
    `;
});


passwordInput.addEventListener("input", () => {
    const value = passwordInput.value;

    const length = value.length >= 8;
    const upper = /[A-Z]/.test(value);
    const number = /[0-9]/.test(value);
    const special = /[!@#$%^&*]/.test(value);

    const rules = document.getElementById("passwordRules");

    rules.innerHTML = `
    <span style="color:${length ? 'green' : 'red'}">✔ At least 8 characters</span><br>
    <span style="color:${upper ? 'green' : 'red'}">✔ One uppercase letter</span><br>
    <span style="color:${number ? 'green' : 'red'}">✔ One number</span><br>
    <span style="color:${special ? 'green' : 'red'}">✔ One special character</span>
    `;
});


    document.addEventListener("DOMContentLoaded", function() {

    const savedTheme = localStorage.getItem("theme");

    if (savedTheme === "dark") {
        document.body.classList.add("dark-mode");
    } else {
        document.body.classList.remove("dark-mode");
    }

});
</script>
</body>

</html>
