{% load static %}
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | Explore Pathanamthitta</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
      body{
        background:linear-gradient(135deg, #0f2027,#203a43, #2c5364);
        min-height:100vh;
        display:flex;
        align-items:center;
        justify-content:center;
      }
      .auth-card{
        background:#ffffff;
        padding:40px;
        border-radius:15px;
        width:100%;
        max-width:420px;
        box-shadow:0 15px 35px rgba(0,0,0,0,2);
      }
      .auth-title{
        font-weight:600;
        margin-bottom:25px;
        text-align:center;
      }
      .form-control{
        border-radius:10px;
      }
      .btn-success{
        border-radius:10px;
        padding:10px;
      }
      @media(max-width:576){
        .auth-card{
          padding:25px;
        }
      }
    </style>
  </head>
  <body>
    <div class="auth-card">
      <h3 class="auth-title">Create Account</h3>
      <form method="POST">
        {% csrf_token %}
        {% if form.errors %}
          <div class="alert alert-danger">
            {{form.errors}}
          </div>
        {% endif %}
        <div class="mb-3">
          <label class="form-label">Username</label>
          {{form.username}}
        </div>
        <div class="mb-3">
          <label class="form-label">Password</label>
          {{form.password1}}
        </div>
        <div class="mb-3">
          <label class="form-label">Confirm Password</label>
          {{form.password2}}
        </div>
        <div class="d-grid">
          <button type="submit" class="btn btn-success">Sign Up</button>
        </div>
        <p class="text-center mt-3">Already have an account?<a href="{% url 'login' %}">Login</a></p>
      </form>
    </div>
  </body>
</html>
